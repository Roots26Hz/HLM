name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install locked environment
        run: uv sync --frozen

      - name: Verify notebooks reproduce
        run: uv run python tools/verify_notebooks.py

      - name: Check index is in sync
        run: uv run python tools/build_index.py --check
